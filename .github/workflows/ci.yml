name: macOS CI

on:
  pull_request:
    branches:
      - main
      - development
  push:
    branches:
      - main
      - development

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-checks:
    runs-on: macOS-latest
    name: Run change-aware CI preflight and build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout MAS Scholar Skills display pack
        uses: actions/checkout@v6
        with:
          repository: gaofeng21cn/mas-scholar-skills
          path: .ci/mas-scholar-skills

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Checkout and build OPL Framework
        run: |
          git clone --depth=1 --filter=blob:none https://github.com/gaofeng21cn/one-person-lab.git ../one-person-lab
          npm ci --prefix ../one-person-lab --ignore-scripts
          npm run --prefix ../one-person-lab build
          echo "OPL_BIN=$GITHUB_WORKSPACE/../one-person-lab/bin/opl" >> "$GITHUB_ENV"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Export isolated test requirements
        run: uv export --quiet --frozen --no-emit-project --group dev --format requirements-txt > "${RUNNER_TEMP}/mas-requirements.txt"

      - name: Link OPL Framework
        run: "$OPL_BIN" packages link-framework --agent-root "$GITHUB_WORKSPACE" --json

      - name: Run change-aware CI preflight
        run: scripts/verify.sh ci-preflight "${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}"

      - name: Run medical paper ops contract guard
        run: make test-medical-paper-ops

      - name: Build sdist and wheel
        run: scripts/run-build-clean.sh --outdir "${RUNNER_TEMP}/mas-dist"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-dist
          path: ${{ runner.temp }}/mas-dist
          retention-days: 7
