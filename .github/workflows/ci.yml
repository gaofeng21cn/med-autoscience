name: macOS CI

on:
  push:
    branches:
      - main
      - development

jobs:
  quick-checks:
    runs-on: macOS-latest
    name: Run fast/meta tests and build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install pandoc
        run: brew install pandoc

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run meta tests
        run: scripts/verify.sh meta

      - name: Run fast tests
        run: scripts/verify.sh

      - name: Build sdist and wheel
        run: uv run python -m build --sdist --wheel

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-dist
          path: dist

  display-surface:
    runs-on: macOS-latest
    name: Run display-heavy tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install pandoc, graphviz, and R
        run: brew install pandoc graphviz r

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Ensure study runtime analysis bundle
        run: |
          uv run python - <<'PY'
          import json
          import sys

          from med_autoscience.study_runtime_analysis_bundle import ensure_study_runtime_analysis_bundle

          result = ensure_study_runtime_analysis_bundle()
          print(json.dumps(result, ensure_ascii=False, indent=2))
          raise SystemExit(0 if result.get("ready") else 1)
          PY

      - name: Run display tests
        run: scripts/verify.sh display
