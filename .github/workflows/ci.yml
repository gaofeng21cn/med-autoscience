name: macOS CI

on:
  push:
    branches:
      - main
      - development

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-checks:
    runs-on: macOS-latest
    name: Run change-aware CI preflight and build
    env:
      PYTHONPATH: src
      UV_NO_SYNC: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install dependencies
        run: uv sync --frozen --group dev --no-install-project

      - name: Run change-aware CI preflight
        run: scripts/verify.sh ci-preflight "${{ github.event.before }}"

      - name: Run medical paper ops contract guard
        run: make test-medical-paper-ops

      - name: Build sdist and wheel
        run: scripts/run-build-clean.sh --outdir "${RUNNER_TEMP}/mas-dist"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-dist
          path: ${{ runner.temp }}/mas-dist
          retention-days: 7
