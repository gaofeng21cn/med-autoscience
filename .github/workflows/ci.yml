name: macOS CI

on:
  push:
    branches:
      - main
      - development

jobs:
  quick-checks:
    runs-on: macOS-latest
    name: Run change-aware CI preflight and build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout MedDeepScientist sibling for AI-first drift audit
        uses: actions/checkout@v6
        with:
          repository: gaofeng21cn/med-deepscientist
          path: .ci/med-deepscientist

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run change-aware CI preflight
        run: scripts/verify.sh ci-preflight "${{ github.event.before }}"

      - name: Run medical paper ops contract guard
        run: make test-medical-paper-ops

      - name: Build sdist and wheel
        run: uv run python -m build --sdist --wheel

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-dist
          path: dist
