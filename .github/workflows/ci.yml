name: macOS CI

on:
  push:
    branches:
      - main
      - development

jobs:
  quick-checks:
    runs-on: macOS-latest
    name: Run stable core tests and build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install pandoc and BasicTeX
        run: |
          brew install pandoc
          brew install --cask basictex

      - name: Configure TeX toolchain
        run: |
          echo "/Library/TeX/texbin" >> "${GITHUB_PATH}"
          /Library/TeX/texbin/xelatex --version | head -n 1

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run meta tests
        run: scripts/verify.sh meta

      - name: Run fast tests
        run: scripts/verify.sh

      - name: Build sdist and wheel
        run: uv run python -m build --sdist --wheel

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-dist
          path: dist
