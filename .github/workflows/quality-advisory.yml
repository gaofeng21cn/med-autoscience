name: OPL Quality Advisory

on:
  pull_request:
  push:
    branches:
      - main
      - development

permissions:
  contents: read

jobs:
  structural-gate:
    name: OPL quality details
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure origin/main compare ref
        shell: bash
        run: git fetch --no-tags --prune origin main:refs/remotes/origin/main

      - name: Run OPL quality details
        uses: gaofeng21cn/one-person-lab/.github/actions/quality-details@main
        continue-on-error: true
        with:
          root: .
          limit: '20'
          json-limit: '50'
          compare-ref: origin/main
          output-dir: artifacts/opl-quality-details

      - name: Upload OPL quality details
        uses: actions/upload-artifact@v7
        with:
          name: opl-quality-details
          path: artifacts/opl-quality-details/quality-details.json
          if-no-files-found: warn
