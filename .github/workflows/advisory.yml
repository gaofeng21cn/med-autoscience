name: macOS Advisory

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  advisory:
    runs-on: macOS-latest
    name: ${{ matrix.label }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: regression
            label: Run regression advisory tests
          - lane: meta
            label: Run meta advisory tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Run advisory lane
        run: scripts/verify.sh ${{ matrix.lane }}
