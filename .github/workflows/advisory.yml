name: macOS Advisory

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    runs-on: macOS-latest
    name: Run regression advisory tests
    continue-on-error: true
    env:
      PYTHONPATH: src
      UV_NO_SYNC: "1"
      MAS_TEST_LANE_SUMMARY_PATH: artifacts/mas-test-lane-summaries/regression.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install dependencies
        run: uv sync --frozen --group dev --no-install-project

      - name: Run regression tests
        run: scripts/verify.sh regression

      - name: Summarize regression lane duration
        if: always()
        continue-on-error: true
        run: uv run python scripts/summarize-test-lane-durations.py "${MAS_TEST_LANE_SUMMARY_PATH}"

      - name: Upload regression lane summary
        if: always()
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: mas-test-lane-summary-regression
          path: ${{ env.MAS_TEST_LANE_SUMMARY_PATH }}
          if-no-files-found: warn
          retention-days: 14

  meta-contracts:
    runs-on: macOS-latest
    name: Run meta advisory tests
    continue-on-error: true
    env:
      PYTHONPATH: src
      UV_NO_SYNC: "1"
      MAS_TEST_LANE_SUMMARY_PATH: artifacts/mas-test-lane-summaries/meta.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install dependencies
        run: uv sync --frozen --group dev --no-install-project

      - name: Run meta tests
        run: scripts/verify.sh meta

      - name: Summarize meta lane duration
        if: always()
        continue-on-error: true
        run: uv run python scripts/summarize-test-lane-durations.py "${MAS_TEST_LANE_SUMMARY_PATH}"

      - name: Upload meta lane summary
        if: always()
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: mas-test-lane-summary-meta
          path: ${{ env.MAS_TEST_LANE_SUMMARY_PATH }}
          if-no-files-found: warn
          retention-days: 14

  family-shared:
    runs-on: macOS-latest
    name: Run family shared advisory tests
    continue-on-error: true
    env:
      PYTHONPATH: src
      UV_NO_SYNC: "1"
      MAS_TEST_LANE_SUMMARY_PATH: artifacts/mas-test-lane-summaries/family.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install dependencies
        run: uv sync --frozen --group dev --no-install-project

      - name: Run family shared tests
        run: scripts/verify.sh family

      - name: Summarize family lane duration
        if: always()
        continue-on-error: true
        run: uv run python scripts/summarize-test-lane-durations.py "${MAS_TEST_LANE_SUMMARY_PATH}"

      - name: Upload family lane summary
        if: always()
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: mas-test-lane-summary-family
          path: ${{ env.MAS_TEST_LANE_SUMMARY_PATH }}
          if-no-files-found: warn
          retention-days: 14

  submission-surface:
    runs-on: macOS-latest
    name: Run submission-heavy advisory tests
    continue-on-error: true
    env:
      PYTHONPATH: src
      UV_NO_SYNC: "1"
      MAS_TEST_LANE_SUMMARY_PATH: artifacts/mas-test-lane-summaries/submission.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install pandoc and BasicTeX
        run: |
          brew install pandoc
          brew install --cask basictex

      - name: Configure TeX toolchain
        run: |
          echo "/Library/TeX/texbin" >> "${GITHUB_PATH}"
          /Library/TeX/texbin/xelatex --version | head -n 1

      - name: Install dependencies
        run: uv sync --frozen --group dev --no-install-project

      - name: Run submission tests
        run: scripts/verify.sh submission

      - name: Summarize submission lane duration
        if: always()
        continue-on-error: true
        run: uv run python scripts/summarize-test-lane-durations.py "${MAS_TEST_LANE_SUMMARY_PATH}"

      - name: Upload submission lane summary
        if: always()
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: mas-test-lane-summary-submission
          path: ${{ env.MAS_TEST_LANE_SUMMARY_PATH }}
          if-no-files-found: warn
          retention-days: 14

  display-surface:
    runs-on: macOS-latest
    name: Run display-heavy advisory tests
    continue-on-error: true
    env:
      PYTHONPATH: src
      UV_NO_SYNC: "1"
      MAS_TEST_LANE_SUMMARY_PATH: artifacts/mas-test-lane-summaries/display.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install pandoc, BasicTeX, graphviz, R, and R package build dependencies
        run: |
          brew install pandoc graphviz pkg-config libxml2 r
          brew install --cask basictex

      - name: Configure R package build and TeX environments
        run: |
          echo "/Library/TeX/texbin" >> "${GITHUB_PATH}"
          echo "$(brew --prefix libxml2)/bin" >> "${GITHUB_PATH}"
          echo "PKG_CONFIG_PATH=$(brew --prefix libxml2)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"
          echo "XML_CONFIG=$(brew --prefix libxml2)/bin/xml2-config" >> "${GITHUB_ENV}"
          /Library/TeX/texbin/xelatex --version | head -n 1

      - name: Install dependencies
        run: uv sync --frozen --group dev --no-install-project

      - name: Ensure study runtime analysis bundle
        run: |
          uv run python - <<'PY'
          import json
          import sys

          from med_autoscience.study_runtime_analysis_bundle import ensure_study_runtime_analysis_bundle

          result = ensure_study_runtime_analysis_bundle()
          print(json.dumps(result, ensure_ascii=False, indent=2))
          raise SystemExit(0 if result.get("ready") else 1)
          PY

      - name: Run display tests
        run: scripts/verify.sh display

      - name: Summarize display lane duration
        if: always()
        continue-on-error: true
        run: uv run python scripts/summarize-test-lane-durations.py "${MAS_TEST_LANE_SUMMARY_PATH}"

      - name: Upload display lane summary
        if: always()
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: mas-test-lane-summary-display
          path: ${{ env.MAS_TEST_LANE_SUMMARY_PATH }}
          if-no-files-found: warn
          retention-days: 14

  duration-history:
    runs-on: macOS-latest
    name: Summarize advisory lane duration history
    needs:
      - regression
      - meta-contracts
      - family-shared
      - submission-surface
      - display-surface
    if: always()
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Download advisory lane summaries
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          pattern: mas-test-lane-summary-*
          path: artifacts/mas-test-lane-summary-history
          merge-multiple: true

      - name: Summarize advisory lane duration history
        if: always()
        continue-on-error: true
        run: |
          mkdir -p artifacts/mas-test-lane-summary-history-summary
          history_text=artifacts/mas-test-lane-summary-history-summary/history.txt
          history_json=artifacts/mas-test-lane-summary-history-summary/history.json
          history_markdown=artifacts/mas-test-lane-summary-history-summary/history.md

          if [[ -f artifacts/mas-test-lane-baseline.json ]]; then
            uv run python scripts/summarize-test-lane-history.py \
              artifacts/mas-test-lane-summary-history \
              --baseline artifacts/mas-test-lane-baseline.json >"${history_text}"
            uv run python scripts/summarize-test-lane-history.py \
              artifacts/mas-test-lane-summary-history \
              --baseline artifacts/mas-test-lane-baseline.json \
              --format json >"${history_json}"
          else
            uv run python scripts/summarize-test-lane-history.py artifacts/mas-test-lane-summary-history >"${history_text}"
            uv run python scripts/summarize-test-lane-history.py \
              artifacts/mas-test-lane-summary-history \
              --format json >"${history_json}"
          fi

          cat "${history_text}"
          {
            echo "## Advisory lane duration history"
            echo
            echo "Fields: median/max/slowest/delta."
            echo
            echo '```text'
            cat "${history_text}"
            echo '```'
          } >"${history_markdown}"
          cat "${history_markdown}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload advisory lane duration history
        if: always()
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: mas-test-lane-history-summary
          path: artifacts/mas-test-lane-summary-history-summary
          if-no-files-found: warn
          retention-days: 14
