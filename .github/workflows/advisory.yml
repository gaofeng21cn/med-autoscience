name: macOS Advisory

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  advisory:
    runs-on: macOS-latest
    name: ${{ matrix.label }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: regression
            label: Run regression advisory tests
            system_dependencies: none
            prepare_analysis_bundle: false
          - lane: meta
            label: Run meta advisory tests
            system_dependencies: none
            prepare_analysis_bundle: false
          - lane: family
            label: Run family shared advisory tests
            system_dependencies: none
            prepare_analysis_bundle: false
          - lane: submission
            label: Run submission-heavy advisory tests
            system_dependencies: tex
            prepare_analysis_bundle: false
          - lane: display
            label: Run display-heavy advisory tests
            system_dependencies: display
            prepare_analysis_bundle: true
    env:
      PYTHONPATH: src
      UV_NO_SYNC: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: Install pandoc and BasicTeX
        if: matrix.system_dependencies == 'tex'
        run: |
          brew install pandoc
          brew install --cask basictex

      - name: Install display system dependencies
        if: matrix.system_dependencies == 'display'
        run: |
          brew install pandoc graphviz pkg-config libxml2 r
          brew install --cask basictex

      - name: Configure TeX toolchain
        if: matrix.system_dependencies != 'none'
        run: |
          echo "/Library/TeX/texbin" >> "${GITHUB_PATH}"
          /Library/TeX/texbin/xelatex --version | head -n 1

      - name: Configure display package build environment
        if: matrix.system_dependencies == 'display'
        run: |
          echo "$(brew --prefix libxml2)/bin" >> "${GITHUB_PATH}"
          echo "PKG_CONFIG_PATH=$(brew --prefix libxml2)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "${GITHUB_ENV}"
          echo "XML_CONFIG=$(brew --prefix libxml2)/bin/xml2-config" >> "${GITHUB_ENV}"

      - name: Install dependencies
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.temp }}/mas-ci-venv
        run: uv sync --frozen --group dev --no-install-project

      - name: Ensure study runtime analysis bundle
        if: matrix.prepare_analysis_bundle
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          uv run python - <<'PY'
          import json
          import sys

          from med_autoscience.study_runtime_analysis_bundle import ensure_study_runtime_analysis_bundle

          result = ensure_study_runtime_analysis_bundle()
          print(json.dumps(result, ensure_ascii=False, indent=2))
          raise SystemExit(0 if result.get("ready") else 1)
          PY

      - name: Run advisory lane
        run: scripts/verify.sh ${{ matrix.lane }}
