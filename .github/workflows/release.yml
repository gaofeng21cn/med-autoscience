name: macOS Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: macOS-latest
    name: Build and publish macOS release assets
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install pandoc and graphviz
        run: brew install pandoc graphviz

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run full test baseline
        run: make test-full

      - name: Build sdist and wheel
        run: uv run python -m build --sdist --wheel

      - name: Derive release metadata
        id: release_meta
        run: |
          prerelease_pattern='^v[0-9]+\.[0-9]+\.[0-9]+(a[0-9]+|b[0-9]+|rc[0-9]+|-alpha[0-9]*|-beta[0-9]*|-rc[0-9]*)$'
          if [[ "${GITHUB_REF_NAME}" =~ ${prerelease_pattern} ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          body_path: .github/release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.whl
            scripts/install-macos.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
