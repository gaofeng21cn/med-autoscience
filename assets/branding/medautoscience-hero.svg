<svg width="1440" height="600" viewBox="0 0 1440 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="医学研究者、数据协同与成果的主示意图">
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020b1c" />
      <stop offset="40%" stop-color="#051833" />
      <stop offset="100%" stop-color="#0a2554" />
    </linearGradient>
    <linearGradient id="glow" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#2e6fbf" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#0c1c3a" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="center-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e7bff" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#00204a" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2cdfff" />
      <stop offset="100%" stop-color="#7bd5ff" />
    </linearGradient>
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.8" />
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1440" height="600" fill="url(#hero-bg)" />
  <rect x="380" y="60" width="680" height="480" rx="48" fill="url(#center-glow)" />
  <g filter="url(#outerGlow)">
    <circle cx="210" cy="140" r="120" fill="#1e2658" fill-opacity="0.8" />
    <circle cx="1230" cy="420" r="140" fill="#1e468a" fill-opacity="0.22" />
  </g>

  <g transform="translate(120, 100)">
    <g>
      <path d="M0 0 C-30 -15 -60 30 -30 90 L30 90 C60 30 30 -15 0 0 Z" fill="#0d1f46" stroke="#39c4ff" stroke-width="2" />
      <circle cx="0" cy="20" r="38" fill="#0b2a54" stroke="#5ed8ff" stroke-width="2" />
      <circle cx="0" cy="20" r="20" fill="#172c5b" />
      <g stroke="#6fd8ff" stroke-width="2" stroke-linecap="round">
        <line x1="0" y1="5" x2="0" y2="-40" />
        <line x1="0" y1="-40" x2="-24" y2="-70" />
        <line x1="0" y1="-40" x2="24" y2="-70" />
      </g>
    </g>
    <path d="M-40 120 Q0 150 40 120" stroke="#74d5ff" stroke-width="3" fill="none" />
    <g fill="#44c8ff">
      <circle cx="80" cy="80" r="10" />
      <circle cx="120" cy="110" r="8" />
      <circle cx="40" cy="40" r="6" />
    </g>
    <text x="-72" y="180" fill="#8fdcff" font-family="Inter, 'PingFang SC', sans-serif" font-size="22">医学研究者</text>
    <text x="-72" y="210" fill="#6bdcff" font-family="Inter, 'PingFang SC', sans-serif" font-size="18">专病数据</text>
  </g>

  <g transform="translate(480, 90)">
    <rect x="-220" y="0" width="440" height="56" rx="28" fill="#101b35" stroke="#3fb0ff" stroke-width="1.5" />
    <text x="0" y="36" fill="#9ed9ff" font-size="20" font-weight="600" font-family="Inter, 'PingFang SC', sans-serif" text-anchor="middle">私有数据资产</text>
    <path d="M-220 90 H220" stroke="#4abdff" stroke-width="1.2" stroke-dasharray="12 8" />
    <rect x="-190" y="110" width="380" height="50" rx="20" fill="#0e2141" stroke="#3f8bf0" stroke-width="2" />
    <text x="0" y="142" fill="#65d4ff" font-size="16" font-family="Inter, 'PingFang SC', sans-serif" text-anchor="middle">公开数据</text>
    <g transform="translate(0, 190)">
      <rect x="-180" y="0" width="360" height="44" rx="18" fill="#0b1b37" stroke="#2f89e4" stroke-width="1.8" />
      <text x="0" y="28" fill="#8ed3ff" font-size="17" font-family="Inter, 'PingFang SC', sans-serif" text-anchor="middle">DeepScientist</text>
      <rect x="-180" y="52" width="360" height="44" rx="18" fill="#0c1f3a" stroke="#2f89e4" stroke-width="1.8" />
      <text x="0" y="80" fill="#8ed3ff" font-size="17" font-family="Inter, 'PingFang SC', sans-serif" text-anchor="middle">ToolUniverse</text>
      <rect x="-180" y="104" width="360" height="44" rx="18" fill="#0c1f3a" stroke="#2f89e4" stroke-width="1.8" />
      <text x="0" y="132" fill="#8ed3ff" font-size="17" font-family="Inter, 'PingFang SC', sans-serif" text-anchor="middle">Codex</text>
    </g>
    <g>
      <path d="M-120 260 C-80 310 80 310 120 260" stroke="#48c5ff" stroke-width="3" fill="none" stroke-linecap="round" />
      <circle cx="-120" cy="260" r="8" fill="#7ef3ff" />
      <circle cx="120" cy="260" r="8" fill="#7ef3ff" />
    </g>
  </g>

  <g transform="translate(1040, 120)">
    <rect x="-150" y="20" width="300" height="220" rx="30" fill="#08122c" stroke="#38b4ff" stroke-width="2" />
    <rect x="-120" y="60" width="80" height="130" rx="18" fill="#11254a" stroke="#43c3ff" stroke-width="1.2" />
    <rect x="10" y="80" width="70" height="100" rx="12" fill="#0b2344" stroke="#5df6ff" stroke-width="1" />
    <path d="M30 170 L70 120 L130 150" stroke="#81f1ff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="-90" y="200" width="220" height="28" rx="14" fill="#0d1d3c" stroke="#2eb9ff" stroke-width="1.5" />
    <text x="20" y="220" fill="#96d9ff" font-size="14" font-family="Inter, 'PingFang SC', sans-serif">分析结果 · 图表 · 稿件 · 投稿</text>
  </g>

  <path d="M310 190 C600 120 840 120 1090 210" stroke="#41c3ff" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="15 6" />
  <path d="M330 230 C590 260 810 280 1080 230" stroke="#1fa2ff" stroke-width="2" fill="none" />
  <circle cx="310" cy="190" r="10" fill="#7ef3ff" />
  <circle cx="1090" cy="210" r="10" fill="#7ef3ff" />

  <text x="720" y="558" fill="#8fcfff" font-size="17" font-family="Inter, 'PingFang SC', sans-serif" text-anchor="middle">以数据资产、智能体协作与研究交付为核心的医学自动科研平台</text>
</svg>
