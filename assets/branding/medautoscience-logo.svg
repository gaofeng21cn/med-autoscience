<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="MedAutoScience logo" style="background: transparent;">
  <title>MedAutoScience</title>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0cb8d2" />
      <stop offset="65%" stop-color="#1c5f9b" />
      <stop offset="100%" stop-color="#052348" />
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7ef0ff" />
      <stop offset="55%" stop-color="#2bc4f9" />
      <stop offset="100%" stop-color="#1a76d8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="320" height="320" rx="32" fill="url(#grad)" />
  <g filter="url(#glow)">
    <path d="M90 220l50-130 60 70 40-45" fill="none" stroke="url(#strokeGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
    <circle cx="150" cy="170" r="18" fill="#8cf6ff" />
    <circle cx="210" cy="120" r="10" fill="#50c7ff" />
    <path d="M70 180a32 32 0 0 1 32-32h50" fill="none" stroke="#67d8ff" stroke-width="6" stroke-linecap="round" />
  </g>
  <g transform="translate(50 40)">
    <circle cx="150" cy="210" r="22" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2" fill="none" />
    <path d="M120 170h50l30 30" fill="none" stroke="#b0e5ff" stroke-width="4" stroke-linecap="round" />
    <path d="M150 220l45-45" fill="none" stroke="#b0e5ff" stroke-width="4" stroke-linecap="round" />
  </g>
  <text x="50%" y="288" fill="#e5f5ff" font-family="'Inter', 'Segoe UI', sans-serif" font-size="24" text-anchor="middle" letter-spacing="0.2em">med-autoscience</text>
</svg>
