[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "med-autoscience"
version = "0.1.0a4"
description = "Medical research domain-agent gateway, overlay, and runtime contract surface."
readme = "README.md"
requires-python = ">=3.12"
authors = [
  { name = "Gao Feng" }
]
dependencies = [
  "PyYAML>=6.0",
  "matplotlib>=3.9",
  "opl-harness-shared @ git+https://github.com/gaofeng21cn/one-person-lab.git@2b08c7efd8acd80355e870087d4ce5be7b45d4d1#subdirectory=python/opl-harness-shared",
  "pandas>=2.2",
  "packaging>=24.0",
  "pypdf>=5.0",
]

[project.optional-dependencies]
analysis = [
  "matplotlib>=3.9",
  "pandas>=2.2",
  "numpy>=1.26",
  "scipy>=1.13",
  "scikit-learn>=1.5",
  "statsmodels>=0.14",
  "lifelines>=0.30",
  "seaborn>=0.13",
  "openpyxl>=3.1",
  "python-docx>=1.1",
  "pillow>=10.0",
  "pypdf>=5.0",
]

[project.scripts]
medautosci = "med_autoscience.cli:entrypoint"
medautosci-mcp = "med_autoscience.mcp_server:entrypoint"

[dependency-groups]
dev = [
  "build>=1.2",
  "pytest>=8.0",
  "pytest-xdist>=3.6",
  "python-docx>=1.1",
]

[tool.setuptools.package-data]
"med_autoscience.styles" = ["*.csl"]
"med_autoscience.overlay.templates" = ["*.md"]
"med_autoscience.agent_entry.resources" = ["*.yaml"]
"med_autoscience.resources" = ["display_pack_repo/config/*.toml", "display_pack_repo/display-packs/**/*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
  "meta: repo-tracked docs, workflow, packaging, and command-surface checks",
  "display_heavy: display materialization and golden-regression tests that dominate wall-clock time",
  "submission_heavy: submission package materialization tests that dominate fast-lane wall-clock time",
  "family: family shared boundary tests that depend on cross-repo shared-module topology",
  "contract: stable command, schema, and owner-surface contracts that protect public behavior",
  "integration: cross-entry or cross-module integration tests that are broader than unit contracts",
  "materialization_heavy: artifact/package materialization tests that should stay out of default regression",
  "soak_or_golden: long-running soak, golden-regression, or fixture-oracle tests",
]
