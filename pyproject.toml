[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "med-autoscience"
version = "0.1.0a4"
description = "Medical research overlay platform for MedDeepScientist-driven studies."
readme = "README.md"
requires-python = ">=3.12"
authors = [
  { name = "Gao Feng" }
]
dependencies = [
  "PyYAML>=6.0",
  "matplotlib>=3.9",
  "opl-harness-shared @ git+https://github.com/gaofeng21cn/one-person-lab.git@b0512ef9c5689dd7eaa1404ff7b2738d6076e6af#subdirectory=python/opl-harness-shared",
  "pandas>=2.2",
  "packaging>=24.0",
]

[project.scripts]
medautosci = "med_autoscience.cli:entrypoint"
medautosci-mcp = "med_autoscience.mcp_server:entrypoint"

[dependency-groups]
dev = [
  "build>=1.2",
  "pytest>=8.0",
  "python-docx>=1.1",
]

[tool.setuptools.package-data]
"med_autoscience.styles" = ["*.csl"]
"med_autoscience.overlay.templates" = ["*.md"]
"med_autoscience.agent_entry.resources" = ["*.yaml"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
  "meta: repo-tracked docs, workflow, packaging, and command-surface checks",
  "display_heavy: display materialization and golden-regression tests that dominate wall-clock time",
]
