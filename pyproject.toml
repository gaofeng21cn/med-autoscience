[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "med-autoscience"
version = "0.1.0a2"
description = "Medical research overlay platform for DeepScientist-driven studies."
readme = "README.md"
requires-python = ">=3.12"
authors = [
  { name = "Gao Feng" }
]
dependencies = ["PyYAML>=6.0"]

[project.scripts]
medautosci = "med_autoscience.cli:entrypoint"

[tool.setuptools.package-data]
"med_autoscience.styles" = ["*.csl"]
"med_autoscience.overlay.templates" = ["*.md"]

[tool.pytest.ini_options]
testpaths = ["tests"]
