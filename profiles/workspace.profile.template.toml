# 这是病种级 workspace profile，不是单篇论文配置。
name = "my-disease-workspace"

# 病种 workspace 根目录。
workspace_root = "/ABS/PATH/TO/MEDICAL-WORKSPACE"

# MAS-owned runtime quest 根目录；新 workspace 默认使用普通目录，不使用 quest Git。
runtime_root = "/ABS/PATH/TO/MEDICAL-WORKSPACE/runtime/quests"

# 当前 workspace 的多 study 根目录。
studies_root = "/ABS/PATH/TO/MEDICAL-WORKSPACE/studies"

# 当前 workspace 的病种级 portfolio 根目录。
portfolio_root = "/ABS/PATH/TO/MEDICAL-WORKSPACE/portfolio"

# legacy diagnostic / backend audit runtime home。新 workspace 默认指向 MAS runtime home；
# 旧 ops/med-deepscientist 路径只通过显式 restore/import diagnostic 读取。
med_deepscientist_runtime_root = "/ABS/PATH/TO/MEDICAL-WORKSPACE/runtime"

# 可选 controlled backend / oracle 源码仓库；仅用于 backend-upgrade audit 或 parity oracle。
med_deepscientist_repo_root = ""

# 外部 Hermes-Agent 源码仓库；只用于 outer runtime substrate 审计与后续真实 adapter cutover。
hermes_agent_repo_root = "/ABS/PATH/TO/hermes-agent"

# Hermes-Agent 的 state / config / gateway home，默认通常是 ~/.hermes。
hermes_home_root = "~/.hermes"
default_publication_profile = "general_medical_journal"
default_citation_style = "AMA"
enable_medical_overlay = true
medical_overlay_scope = "workspace"
medical_overlay_skills = ["intake-audit", "scout", "baseline", "idea", "decision", "experiment", "analysis-campaign", "write", "review", "rebuttal", "finalize"]
research_route_bias_policy = "high_plasticity_medical"
preferred_study_archetypes = ["clinical_classifier", "clinical_subtype_reconstruction", "external_validation_model_update", "gray_zone_triage", "llm_agent_clinical_task", "mechanistic_sidecar_extension"]
